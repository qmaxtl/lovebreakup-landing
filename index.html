<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoveBreakup – AI Healing Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom right, #ffe4e6, #fce7f3);
      color: #1f2937;
      padding: 2rem;
      margin: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: #e11d48;
    }

    textarea {
      width: 100%;
      font-size: 1rem;
      padding: 1rem;
      border: 2px solid #fca5a5;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      resize: vertical;
    }

    button {
      background-color: #ec4899;
      color: white;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #db2777;
    }

    pre {
      background-color: #fef2f2;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1.5rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #111827;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💔 AI Support for Healing</h1>

    <textarea id="userPrompt" rows="4" placeholder="Type something emotional..."></textarea><br>
    <button onclick="generateReply()">Get AI Response</button>
    <pre id="output">Your response will appear here...</pre>
  </div>

  <script>
    async function generateReply() {
      const prompt = document.getElementById('userPrompt').value;
      const res = await fetch('/api/gemini-reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      document.getElementById('output').innerText = data.reply;
    }
  </script>
</body>
</html>
