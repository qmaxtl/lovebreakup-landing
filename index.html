<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Support – LoveBreakup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff0f5;
      padding: 2rem;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 1rem;
    }

    button {
      background: #e11d48;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      font-size: 1rem;
      border-radius: 9999px;
      cursor: pointer;
    }

    button:hover {
      background: #be123c;
    }

    pre {
      background: #fdf2f8;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1.5rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>💔 Need Support?</h2>
    <p>Tell us how you're feeling. Our AI will gently respond.</p>

    <textarea id="userPrompt" rows="4" placeholder="Type something emotional..."></textarea>
    <button onclick="generateReply()">Get AI Response</button>
    <pre id="output">Your reply will appear here.</pre>
  </div>

  <script>
    async function generateReply() {
      const prompt = document.getElementById('userPrompt').value;
      document.getElementById('output').innerText = 'Thinking...';

      const res = await fetch('/api/gemini-reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();
      document.getElementById('output').innerText = data.reply;
    }
  </script>
</body>
</html>
